<div class="search-modal" id="search-modal" hidden>
  <div class="search-backdrop" data-close></div>
  <div class="search-panel" role="dialog" aria-modal="true" aria-label="Search posts">
    <div class="search-input-row">
      <span class="brand-prompt" aria-hidden="true">/</span>
      <input id="search-input" type="search" placeholder="search posts, tags, categories…" autocomplete="off" spellcheck="false">
      <button class="icon-btn" data-close aria-label="Close search">esc</button>
    </div>
    <ul id="search-results" class="search-results" role="listbox"></ul>
    <p class="search-hint">↑↓ navigate · ↵ open · esc close</p>
  </div>
</div>
