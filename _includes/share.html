{% assign share_url = page.url | absolute_url | url_encode %}
{% assign share_title = page.title | url_encode %}
<div class="share" aria-label="Share this post">
  <span class="share-label">share:</span>
  <a rel="noopener" target="_blank" href="https://x.com/intent/tweet?text={{ share_title }}&url={{ share_url }}">x</a>
  <a rel="noopener" target="_blank" href="https://www.linkedin.com/sharing/share-offsite/?url={{ share_url }}">linkedin</a>
  <a rel="noopener" target="_blank" href="https://www.reddit.com/submit?url={{ share_url }}&title={{ share_title }}">reddit</a>
  <a rel="noopener" target="_blank" href="https://news.ycombinator.com/submitlink?u={{ share_url }}&t={{ share_title }}">hn</a>
  <button class="copy-link" data-url="{{ page.url | absolute_url }}">copy link</button>
</div>
