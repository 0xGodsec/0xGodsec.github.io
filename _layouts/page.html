---
layout: default
---
<article class="page wrap-narrow">
  <header class="page-header">
    <h1 class="page-title"><span class="brand-prompt">~$</span> {{ page.title | downcase }}</h1>
    {% if page.description %}<p class="page-desc">{{ page.description }}</p>{% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
